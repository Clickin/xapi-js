name: CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
      fail-fast: false

    steps:
      - id: checkout
        name: Checkout
        uses: actions/checkout@v6
      - id: setup-node
        name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false
      - uses: pnpm/action-setup@v6
      - id: install-deps
        name: Install dependencies
        run: |
          pnpm install --frozen-lockfile
      - name: Build
        run: pnpm build
      - id: test
        name: Run test
        run: |
          pnpm test
      - name: Typecheck
        run: pnpm typecheck

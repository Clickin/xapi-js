name: Release

permissions:
  contents: read

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false

      - uses: pnpm/action-setup@v6

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Run tests
        run: pnpm test

      - name: Typecheck
        run: pnpm typecheck

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false

      - uses: pnpm/action-setup@v6

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Pack packages
        run: pnpm --filter './packages/*' -r pack --pack-destination "$GITHUB_WORKSPACE/release"

      - name: Use an OIDC-capable npm CLI
        run: npm install --global npm@latest

      - name: Publish packages with npm Trusted Publishing
        run: |
          version=$(node -p "require('./package.json').version")
          publish_if_missing() {
            package_name="$1"
            tarball="$2"
            if npm view "$package_name@$version" version >/dev/null 2>&1; then
              echo "$package_name@$version is already published"
            else
              npm publish $tarball --access public
            fi
          }

          publish_if_missing '@xapi-js/core' './release/xapi-js-core-*.tgz'
          publish_if_missing '@xapi-js/adaptor-express' './release/xapi-js-adaptor-express-*.tgz'
          publish_if_missing '@xapi-js/adaptor-fetch' './release/xapi-js-adaptor-fetch-*.tgz'
          publish_if_missing '@xapi-js/adaptor-nestjs' './release/xapi-js-adaptor-nestjs-*.tgz'
          publish_if_missing '@xapi-js/adaptor-hono' './release/xapi-js-adaptor-hono-*.tgz'

      - run: pnpm dlx changelogithub
        env:
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
